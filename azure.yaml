# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: azure-logicapps-monitoring

infra:
  provider: bicep
  path: ./infra/
  module: main

hooks:
  postprovision:
    shell: pwsh
    run: |
      ./hooks/deploy-connections.ps1 `
        -ResourceGroupName $env:AZURE_RESOURCE_GROUP `
        -LogicAppName $env:WORKFLOW_ENGINE_NAME `
        -QueueConnectionName "azurequeues" `
        -TableConnectionName "azuretables" `
        -WorkflowName "eShopOrders"

services:
  PoWebApp:
    project: ./src/PoWebApp/PoWebApp.csproj
    language: dotnet
    host: appservice
    resourceGroup: ${AZURE_RESOURCE_GROUP}

  PoProcAPI:
    project: ./src/PoProcAPI/PoProcAPI.csproj
    language: dotnet
    host: appservice
    resourceGroup: ${AZURE_RESOURCE_GROUP}
