# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: azure-logicapps-monitoring

infra:
  provider: bicep
  path: ./infra/
  module: main

hooks:
  preprovision: 
    shell: pwsh
    run: |
      Write-Host "Pre-provisioning steps..."
      Write-Host "Building Docker images locally..."
      docker-compose build 
      Write-Host "Docker images built successfully."

